<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Craft Landing Page</title>
    <style>
      /* ===== GLOBAL RESET ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      /* ===== PAGE LAYOUT ===== */
      body {
        background: #f4f6f8;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 350px;
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
        color: #333;
      }

      p {
        text-align: center;
        margin-bottom: 25px;
        color: #777;
        font-size: 14px;
      }

      /* ===== MATERIAL FORM FIELD ===== */
      .form-group {
        position: relative;
        margin: 30px 0;
      }

      /* Input */
      .form-group input {
        width: 100%;
        padding: 12px 0 6px 0;
        border: none;
        border-bottom: 2px solid #ccc;
        background: transparent;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s ease;
      }

      /* Label */
      .form-group label {
        position: absolute;
        left: 0;
        top: 12px;
        font-size: 16px;
        color: #9e9e9e;
        pointer-events: none;
        transition: 0.3s ease all;
      }

      /* Animated Underline */
      .form-group .underline {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        width: 100%;
        background: #1976d2;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
      }

      /* ===== FLOAT LABEL ===== */
      .form-group input:focus ~ label,
      .form-group input:not(:placeholder-shown) ~ label {
        top: -8px;
        font-size: 13px;
        color: #1976d2;
      }

      /* ===== FOCUS EFFECT ===== */
      .form-group input:focus {
        border-bottom-color: #1976d2;
      }

      .form-group input:focus ~ .underline {
        transform: scaleX(1);
      }

      /* ===== HOVER EFFECT ===== */
      .form-group input:hover {
        border-bottom-color: #777;
      }

      /* ===== ERROR STATE (Optional) ===== */
      .form-group.error input {
        border-bottom-color: #d32f2f;
      }

      .form-group.error label {
        color: #d32f2f;
      }

      .form-group.error .underline {
        background: #d32f2f;
        transform: scaleX(1);
      }

      /* ===== BUTTON ===== */
      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
        transition:
          background 0.3s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        background: #125aa3;
      }

      button:active {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2) inset;
      }

      /* ===== LINKS ===== */
      a {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        font-size: 14px;
        color: #1976d2;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
    <script>
      function show(shown, hidden) {
        document.getElementById(shown).style.display = "block";
        document.getElementById(hidden).style.display = "none";
        return false;
      }

      // REGISTER USER
      function register(event) {
        event.preventDefault();

        const username = document.getElementById("signup-username").value;
        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;

        if (localStorage.getItem(username)) {
          alert("User already exists!");
          return;
        }

        const userData = {
          email: email,
          password: password,
        };

        localStorage.setItem(username, JSON.stringify(userData));

        alert("Registration successful! Please login.");
        show("login", "signup");
      }

      // LOGIN USER
      function authenticate(event) {
        event.preventDefault();

        const username = document.getElementById("login-username").value;
        const password = document.getElementById("login-password").value;

        const storedUser = localStorage.getItem(username);

        if (!storedUser) {
          alert("User not found!");
          return;
        }

        const userData = JSON.parse(storedUser);

        if (userData.password === password) {
          alert("Login successful!");
          // redirect or show dashboard
          // window.location.href = "dashboard.html";
        } else {
          alert("Incorrect password!");
        }
      }
    </script>
  </head>
  <body>
    <div id="login">
      <h1>Welcome to Code Craft</h1>
      <p>Your gateway to mastering coding skills.</p>
      <div class="login-container">
        <form onsubmit="authenticate(event)">
          <div class="form-group">
            <input id="login-username" type="text" required placeholder=" " />
            <label>Username</label>
          </div>

          <div class="form-group">
            <input
              id="login-password"
              type="password"
              required
              placeholder=" "
            />
            <label>Password</label>
          </div>

          <button type="submit">Login</button>
        </form>
      </div>
      <br />
      <a href="#" onclick="return show('signup', 'login');">Signup</a>
    </div>
    <div id="signup" style="display: none">
      <h1>Welcome to Code Craft</h1>
      <p>Your gateway to mastering coding skills.</p>
      <div class="signup-container">
        <form onsubmit="register(event)">
          <div class="form-group">
            <input id="signup-username" type="text" required placeholder=" " />
            <label>Username</label>
          </div>

          <div class="form-group">
            <input id="signup-email" type="email" required placeholder=" " />
            <label>Email</label>
          </div>

          <div class="form-group">
            <input
              id="signup-password"
              type="password"
              required
              placeholder=" "
            />
            <label>Password</label>
          </div>

          <button type="submit">Sign Up</button>
        </form>
      </div>
      <a href="#" onclick="return show('login', 'signup');">Login</a>
    </div>
  </body>
</html>
